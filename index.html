<body>

<canvas id="matrix"></canvas>
<div id="glitch"></div>
<div id="app"></div>

<script>

/* ================= CONFIG ================= */
let currentScreen = 'start';
let dashboardInterval = null;
let config = null;

/* ========================================
   📝 KONFIGURACE - ZDE MĚNÍŠ TYTO TŘI VĚCI
   ======================================== */

// ⬅️ ZMĚNÍ JMÉNO MISE
const MISSION_NAME = "MISE 1 - DIGITÁLNÍ STOPA";

// ⬅️ ZMĚNÍ ČAS MISE (dny, hodiny, minuty, sekundy)
const MISSION_DEADLINE = new Date(Date.now() + 10 * 24 * 60 * 60 * 1000 + 2 * 60 * 60 * 1000 + 17 * 60 * 1000 + 45 * 1000);

/* ========================================
   PEVNÉ DATUMY - NEUMĚNIT
   ======================================== */

const registrationDeadline = new Date(new Date().getFullYear(), 8, 20, 23, 59, 59);
const operationDeadline = new Date(new Date().getFullYear(), 11, 31, 23, 59, 59);

/* ================= INIT CONFIG ================= */
function initConfig() {
  config = {
    registrationEnd: registrationDeadline,
    mission1End: MISSION_DEADLINE,
    operationEnd: operationDeadline,
    logoutTime: new Date(Date.now() + 2 * 60 * 1000)
  };
}

let timeExpired = {
  registration: false,
  mission: false,
  operation: false
};

const alertMessages = [
  { time: "15:41:47", text: "AGENT NETWORK: ONLINE" },
  { time: "15:41:47", text: "MISSION DATA: SYNCHRONIZED" },
  { time: "15:42:03", text: "SYSTEM STATUS: OPTIMAL" },
  { time: "15:42:15", text: "ALL SYSTEMS: NOMINAL" },
  { time: "15:43:21", text: "DATA STREAM: ACTIVE" },
  { time: "15:44:02", text: "ENCRYPTION: VERIFIED" },
  { time: "15:44:58", text: "AGENT LINK: STABLE" },
  { time: "15:45:12", text: "PROTOCOL: CONFIRMED" },
  { time: "15:45:47", text: "SYNC CHECK: PASSED" },
  { time: "15:46:33", text: "SECURITY: MAINTAINED" }
];

/* ================= MATRIX - LANDSCAPE OPTIMIZED ================= */
const c=document.getElementById("matrix");
const x=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const chars="01NEXUSCOREAGENT██▓▒";
let drops=Array(80).fill(1);

function matrix(){
x.fillStyle="rgba(0,0,0,0.15)";
x.fillRect(0,0,c.width,c.height);

x.fillStyle="#66ff33";
x.font="14px monospace";

for(let i=0;i<drops.length;i++){
let t=chars[Math.random()*chars.length|0];
x.fillText(t,i*20,(drops[i]*14));

if((drops[i]*14)>c.height && Math.random()>0.985)drops[i]=0;
drops[i]++;
}

requestAnimationFrame(matrix);
}
matrix();

/* ================= GLITCH ================= */
function glitch(){
const g=document.getElementById("glitch");
g.classList.remove("glitchOn");
void g.offsetWidth;
g.classList.add("glitchOn");
}

/* ================= TRANSITION ================= */
function transition(fn){
glitch();
if(dashboardInterval){
clearInterval(dashboardInterval);
dashboardInterval = null;
}
setTimeout(fn, 180);
}

/* ================= TIME FORMAT ================= */
function formatTimeWithSeconds(ms){
if(ms <= 0) return "00d 00h 00m 00s";
const days = Math.floor(ms / (24 * 60 * 60 * 1000));
const hours = Math.floor((ms % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
const seconds = Math.floor((ms % (60 * 1000)) / 1000);
return `${String(days).padStart(2, '0')}d ${String(hours).padStart(2, '0')}h ${String(minutes).padStart(2, '0')}m ${String(seconds).padStart(2, '0')}s`;
}

function getProgressFromDates(startDate, endDate){
const now = Date.now();
const start = startDate.getTime();
const end = endDate.getTime();
const total = end - start;
const elapsed = now - start;
const progress = Math.max(0, Math.min(100, (elapsed / total) * 100));
return Math.round(progress);
}

/* ================= SCREEN 1: START ==================== */
function screenStart(){
currentScreen = 'start';
timeExpired = { registration: false, mission: false, operation: false };
document.getElementById("app").innerHTML = `
<div class="screen-start">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  
  <div class="start-title">NEXUS CORE</div>
  <div class="start-subtitle">AGENT TERMINAL</div>
  
  <div class="start-btn" onclick="transition(screenBriefing)">
    PŘIHLÁŠENÍ<br>AGENTA
  </div>
  
  <div class="system-status">SYSTEM STATUS: STANDBY</div>
</div>`;
}

/* ================= SCREEN 2: BRIEFING ==================== */
function screenBriefing(){
currentScreen = 'briefing';
initConfig();

const briefingText = `NEXUS CORE - BRIEFING

Vítejte v systému NEXUS CORE.
Tento terminál je součástí Školní operace,
která prověřuje tvoji schopnost řešit úkoly 
a plnit mise.

Jako agent zde budeš sledovat svůj postup,
časové limity,
a stav celé operace.

Všechny operace jsou monitorovány
v reálném čase. Úspěch závisí na tobě
a tvých rozhodnutích.

PŘIPRAV SE.
SYSTÉM SE CHYSTÁ KE SPUŠTĚNÍ.`;

document.getElementById("app").innerHTML = `
<div class="screen-briefing">
  <div class="briefing-box">
    <h2>NEXUS CORE - BRIEFING</h2>
    <div class="briefing-content">
      <pre id="brief-text"></pre>
    </div>
    <button class="continue-btn" onclick="transition(screenBoot)">POKRAČOVAT →</button>
    <div style="clear:both;"></div>
  </div>
</div>`;

typeWriter(document.getElementById("brief-text"), briefingText, 16);
}

/* ================= SCREEN 3: BOOT ==================== */
function screenBoot(){
currentScreen = 'boot';
document.getElementById("app").innerHTML = `
<div class="screen-boot">
  <div class="boot-box">
    <h2>NEXUS CORE - SYSTEM BOOT</h2>
    <div class="boot-log" id="boot-log"></div>
    <div class="boot-progress-section">
      <div class="boot-progress-label">BOOT PROGRESS:</div>
      <div class="boot-bar">
        <div class="boot-fill" id="boot-fill"></div>
      </div>
      <div class="boot-status" id="boot-status">0%</div>
    </div>
  </div>
</div>`;

const bootLog = document.getElementById("boot-log");
const bootFill = document.getElementById("boot-fill");
const bootStatus = document.getElementById("boot-status");

const bootSteps = [
  "> INITIALIZING MATRIX CORE.............. [ OK ]",
  "> CHECKING SYSTEM INTEGRITY............ [ OK ]",
  "> LOADING MISSION DATA................. [ OK ]",
  "> CONNECTING TO CENTRAL DATABASE........ [ OK ]",
  "> SYNCING AGENT NETWORK................ [ OK ]",
  "> ENCRYPTING DATA CHANNELS............. [ OK ]",
  "> CALIBRATING TIME CORE................ [ OK ]",
  "> VERIFYING ACCESS LEVELS.............. [ OK ]",
  "> FINALIZING BOOT PROCESS.............. [ OK ]",
];

let bootIdx = 0;

function addBootLine(){
if(bootIdx < bootSteps.length){
const line = document.createElement("div");
line.className = "line";
line.textContent = bootSteps[bootIdx];
bootLog.appendChild(line);

const bootProgress = Math.round((bootIdx / bootSteps.length) * 100);
bootFill.style.width = bootProgress + "%";
bootStatus.textContent = bootProgress + "%";

bootIdx++;
setTimeout(addBootLine, 250);
}else{
bootFill.style.width = "100%";
bootStatus.textContent = "100%";

const finalLine = document.createElement("div");
finalLine.textContent = "\nPŘÍSTUP POVOLEN\nVÍTEJ, AGENTE.";
finalLine.style.marginTop = "15px";
finalLine.style.opacity = "0.9";
bootLog.appendChild(finalLine);

setTimeout(()=>transition(screenDashboard), 1500);
}
}

addBootLine();
}

/* ================= SIGNAL VISUALIZATION ================= */
function generateSignalPattern(){
const bars = [];
for(let i = 0; i < 16; i++){
const randomHeight = Math.random() * 80 + 20;
bars.push(randomHeight);
}
return bars;
}

/* ================= GET RANDOM ALERTS ================= */
function getRandomAlerts(){
const count = 4;
const shuffled = [...alertMessages].sort(() => Math.random() - 0.5);
return shuffled.slice(0, count);
}

/* ================= SCREEN 4: DASHBOARD ==================== */
function screenDashboard(){
currentScreen = 'dashboard';
const dashboardStartTime = Date.now();

const dashboard = `
<div class="screen-dashboard">
  <div class="dashboard-header">
    <div class="dashboard-header-title">NEXUS CORE // DASHBOARD</div>

document.getElementById("app").innerHTML = dashboard;

function updateDashboard(){
if(currentScreen !== 'dashboard') return;

const now = Date.now();

const timeEl = document.querySelector("#header-time");
if(!timeEl) return;

const dateObj = new Date();
timeEl.textContent = dateObj.toLocaleTimeString('cs-CZ');

// Registration
const regRemain = Math.max(0, config.registrationEnd.getTime() - now);
const timeRegEl = document.getElementById("time-reg");
const cardReg = document.getElementById("card-registration");
if(timeRegEl){
timeRegEl.textContent = "ZBÝVAJÍCÍ ČAS: " + formatTimeWithSeconds(regRemain);
if(regRemain === 0 && !timeExpired.registration){
timeExpired.registration = true;
if(cardReg) cardReg.classList.add("expired");
if(timeRegEl) timeRegEl.innerHTML += '<div class="card-expired-message">▶ ČAS VYPRŠEL</div>';
}
}
const regPercent = getProgressFromDates(new Date(dashboardStartTime - config.registrationEnd.getTime() + now), config.registrationEnd);
const barReg = document.getElementById("bar-reg");
if(barReg) barReg.style.width = regPercent + "%";

// Mission
const missRemain = Math.max(0, config.mission1End.getTime() - now);
const timeMissEl = document.getElementById("time-mission");
const cardMiss = document.getElementById("card-mission");
if(timeMissEl){
timeMissEl.textContent = "ZBÝVAJÍCÍ ČAS: " + formatTimeWithSeconds(missRemain);
if(missRemain === 0 && !timeExpired.mission){
timeExpired.mission = true;
if(cardMiss) cardMiss.classList.add("expired");
if(timeMissEl) timeMissEl.innerHTML += '<div class="card-expired-message">▶ ČAS VYPRŠEL</div>';
}
}
const missPercent = getProgressFromDates(new Date(dashboardStartTime - config.mission1End.getTime() + now), config.mission1End);
const barMiss = document.getElementById("bar-mission");
if(barMiss) barMiss.style.width = missPercent + "%";

// Operation
const opRemain = Math.max(0, config.operationEnd.getTime() - now);
const valOp = document.getElementById("val-operation");
const cardOp = document.getElementById("card-operation");
if(valOp){
valOp.textContent = formatTimeWithSeconds(opRemain);
if(opRemain === 0 && !timeExpired.operation){
timeExpired.operation = true;
if(cardOp) cardOp.classList.add("expired");
}
}
const opPercent = getProgressFromDates(new Date(dashboardStartTime - config.operationEnd.getTime() + now), config.operationEnd);
const barOp = document.getElementById("bar-operation");
if(barOp) barOp.style.width = opPercent + "%";
const percentOp = document.getElementById("percent-operation");
if(percentOp) percentOp.textContent = opPercent + "%";

// Logout
const logoutRemain = Math.max(0, config.logoutTime.getTime() - now);
const logoutSec = Math.floor(logoutRemain / 1000);
const logoutMin = Math.floor(logoutSec / 60);
const logoutMs = logoutSec % 60;
const valLogout = document.getElementById("val-logout");
if(valLogout) valLogout.textContent = "00:" + String(logoutMin).padStart(2,'0') + ":" + String(logoutMs).padStart(2,'0');
const logoutPercent = getProgressFromDates(new Date(dashboardStartTime - config.logoutTime.getTime() + now), config.logoutTime);
const barLogout = document.getElementById("bar-logout");
if(barLogout) barLogout.style.width = logoutPercent + "%";
const percentLogout = document.getElementById("percent-logout");
if(percentLogout) percentLogout.textContent = logoutPercent + "%";

const fullDate = dateObj.toISOString().slice(0,19).replace('T',' ');
const dashTime = document.getElementById("dashboard-time");
if(dashTime) dashTime.textContent = fullDate;

if(Math.random() > 0.85){
signalBars = generateSignalPattern();
renderSignalViz(signalBars);
}

if(Math.random() > 0.92){
renderAlerts(getRandomAlerts());
}

if(logoutRemain <= 0){
clearInterval(dashboardInterval);
transition(screenLogoff);
}
}

function renderSignalViz(bars){
const viz = document.getElementById("signal-viz");
if(!viz) return;
viz.innerHTML = '';
const avgHeight = bars.reduce((a,b)=>a+b,0)/bars.length;
const sigPercent = document.getElementById("signal-percent");
if(sigPercent) sigPercent.textContent = Math.round(avgHeight) + "%";

bars.forEach(height => {
const bar = document.createElement("div");
bar.className = "signal-bar";
if(height > 40) bar.classList.add("active");
bar.style.height = height + "%";
viz.appendChild(bar);
});
}

function renderAlerts(alerts){
const alertList = document.getElementById("alert-list");
if(!alertList) return;
alertList.innerHTML = '';
alerts.forEach(alert => {
const item = document.createElement("div");
item.className = "alert-item";
item.innerHTML = `<span class="alert-time">${alert.time}</span> ${alert.text}`;
alertList.appendChild(item);
});
}

updateDashboard();
dashboardInterval = setInterval(updateDashboard, 1000);
}

/* ================= SCREEN 5: LOGOFF ==================== */
function screenLogoff(){
currentScreen = 'logoff';
document.getElementById("app").innerHTML = `
<div class="screen-logoff">
  <div class="logoff-box">
    <h2>NEXUS CORE - LOGOFF</h2>
    <div class="logoff-process" id="logoff-process"></div>
    <div class="logoff-bar">
      <div class="logoff-fill" id="logoff-fill"></div>
    </div>
    <div class="logoff-status" id="logoff-status"></div>
  </div>
</div>`;

const logoffProcess = document.getElementById("logoff-process");
const logoffFill = document.getElementById("logoff-fill");
const logoffStatus = document.getElementById("logoff-status");

const logoffSteps = [
  "TERMINATING SESSION...",
  "CLOSING CONNECTIONS...",
  "SECURING DATA..."
];

let logoffIdx = 0;

function addLogoffLine(){
if(logoffIdx < logoffSteps.length){
const item = document.createElement("div");
item.className = "logoff-item";
item.textContent = logoffSteps[logoffIdx];
logoffProcess.appendChild(item);

const progress = Math.round(((logoffIdx + 1) / (logoffSteps.length + 1)) * 100);
logoffFill.style.width = progress + "%";

logoffIdx++;
setTimeout(addLogoffLine, 500);
}else{
logoffFill.style.width = "100%";

logoffStatus.innerHTML = `
<div style="margin-bottom:20px;">SYSTEM LOGOFF COMPLETE.</div>
<div style="margin-bottom:20px;">DĚKUJEME, AGENTE.</div>
<div style="margin-bottom:30px;">DO ZOBRAZENÍ VÝSLEDKŮ ZBÝVÁ:</div>
<div style="font-size:36px; color:#00ff66; text-shadow:0 0 20px rgba(0,255,102,0.3);">00:10</div>
`;

setTimeout(()=>transition(screenStart), 3000);
}
}

addLogoffLine();
}

/* ================= TYPEWRITER ================= */
function typeWriter(el, text, speed){
if(!el) return;
let i = 0;
el.innerHTML = '';

function type(){
if(i < text.length){
el.textContent = text.slice(0, i) + '█';
i++;
setTimeout(type, speed);
}else{
el.textContent = text;
}
}

type();
}

/* ================= INIT ================= */
initConfig();
screenStart();

</script>
